# Pipeline do Monitor de Mídia Paga LinkedIn (GitLab CI/CD)
#
# Os jobs rodam por agendamento (Pipeline Schedules do GitLab). Cada schedule
# define a variável SCHEDULE_JOB para escolher qual tarefa executar:
#   SCHEDULE_JOB=daily    -> coleta diária        (sugestão: 0 9 * * *  UTC = 06:00 BRT)
#   SCHEDULE_JOB=weekly   -> report semanal        (sugestão: 0 11 * * 1 UTC = 08:00 BRT seg)
#   SCHEDULE_JOB=monthly  -> report mensal         (sugestão: 0 11 1-3 * * — o job decide o 1º dia útil)
#
# As credenciais ficam em Settings > CI/CD > Variables (marcadas como Masked/Protected).

stages:
  - collect
  - report

default:
  image: python:3.12
  tags:
    - dind
  before_script:
    - pip install -r requirements.txt

coleta_diaria:
  stage: collect
  script:
    - python jobs/daily_collect.py
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCHEDULE_JOB == "daily"'
    - if: '$CI_PIPELINE_SOURCE == "web"'      # permite rodar manualmente pela interface
      when: manual

report_semanal:
  stage: report
  script:
    - python jobs/weekly_report.py
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCHEDULE_JOB == "weekly"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual

report_mensal:
  stage: report
  script:
    - python jobs/monthly_report.py
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $SCHEDULE_JOB == "monthly"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
